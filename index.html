<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>動詞消消樂 - 本地版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:'Noto Sans TC',sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}

/* ===== 背景與裝飾 ===== */
.scene{position:fixed;inset:0;z-index:0;transition:background .8s}
.scene.menu{background:linear-gradient(160deg,#fdf2f8 0%,#fce7f3 30%,#e0f2fe 70%,#f0fdf4 100%)}
.scene.lv1{background:linear-gradient(160deg,#ecfdf5 0%,#d1fae5 40%,#f0fdfa 100%)}
.scene.lv2{background:linear-gradient(160deg,#eff6ff 0%,#dbeafe 40%,#f5f3ff 100%)}
.scene.lv3{background:linear-gradient(160deg,#fdf2f8 0%,#fce7f3 40%,#fff7ed 100%)}

.deco{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.dot{
  position:absolute;border-radius:50%;opacity:.18;
  animation:floaty var(--dur) var(--del) ease-in-out infinite alternate;
}
@keyframes floaty{0%{transform:translateY(0) scale(1)}100%{transform:translateY(var(--dy)) scale(1.1)}}

/* ===== 排版 ===== */
.wrap{position:relative;z-index:10;max-width:500px;margin:0 auto;padding:10px 12px 24px}
.screen{display:none;animation:fadeIn .45s ease both}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ===== 吉祥物 ===== */
.mascot-area{display:flex;justify-content:center;margin-bottom:6px;position:relative;height:100px}
.mascot-area.sm{height:74px}
.mascot{position:relative;animation:bounce 2.5s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-8px) rotate(1deg)}}

.cat{width:72px;height:72px;position:relative}
.cat.sm{width:56px;height:56px}
.cat-head{width:100%;height:100%;border-radius:50%;background:linear-gradient(140deg,#fef3c7,#fde68a);box-shadow:0 4px 16px rgba(251,191,36,.25);position:relative}
.cat-ear{position:absolute;top:-10px;width:22px;height:26px;background:linear-gradient(140deg,#fde68a,#fbbf24);border-radius:50% 50% 6px 6px}
.cat-ear.l{left:6px;transform:rotate(-15deg)}
.cat-ear.r{right:6px;transform:rotate(15deg)}
.cat-ear::after{content:'';position:absolute;top:5px;left:50%;transform:translateX(-50%);width:10px;height:14px;background:#fda4af;border-radius:50% 50% 4px 4px}
.cat-eye{position:absolute;top:38%;width:10px;height:12px;background:#1e1b4b;border-radius:50%}
.cat-eye.l{left:22%}.cat-eye.r{right:22%}
.cat-nose{position:absolute;top:52%;left:50%;transform:translateX(-50%);width:8px;height:5px;background:#f9a8d4;border-radius:50%}
.cat-mouth{position:absolute;top:60%;left:50%;transform:translateX(-50%);width:16px;height:8px}
.cat-mouth::before,.cat-mouth::after{content:'';position:absolute;top:0;width:9px;height:8px;border-bottom:2px solid #d97706;border-radius:0 0 50% 50%}
.cat-mouth::before{left:0}.cat-mouth::after{right:0}
.cat-blush{position:absolute;top:50%;width:14px;height:8px;background:rgba(251,113,133,.3);border-radius:50%}
.cat-blush.l{left:8%}.cat-blush.r{right:8%}

.speech{position:absolute;left:calc(50% + 42px);top:10px;background:#fff;color:#6d28d9;font-weight:700;font-size:.78em;padding:7px 12px;border-radius:14px;white-space:nowrap;box-shadow:0 3px 14px rgba(0,0,0,.08)}
.speech.sm{left:calc(50% + 34px);top:6px;font-size:.7em;padding:5px 10px}
.speech::before{content:'';position:absolute;left:-6px;top:50%;transform:translateY(-50%);border:6px solid transparent;border-right-color:#fff}

/* ===== 標題與遊戲資訊 ===== */
.hdr{text-align:center;padding:14px 12px 10px;background:rgba(255,255,255,.55);backdrop-filter:blur(12px);border-radius:22px;margin-bottom:8px;border:2px solid rgba(255,255,255,.7);box-shadow:0 4px 0 rgba(0,0,0,.04),0 8px 16px rgba(0,0,0,.04)}
.hdr h1{font-size:1.8em;color:#7c3aed;font-weight:900;letter-spacing:4px;text-shadow:0 2px 4px rgba(0,0,0,.08)}
.bar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:rgba(255,255,255,.5);backdrop-filter:blur(10px);border-radius:14px;margin-bottom:12px;border:2px solid rgba(255,255,255,.6);font-weight:700;font-size:.85em;color:#6d28d9;box-shadow:0 4px 0 rgba(0,0,0,.04)}

/* ===== 答題區域 ===== */
.ans-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px;min-height:80px}
.ans-slot{width:68px;height:68px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-weight:900;position:relative;overflow:hidden;transition:all .2s cubic-bezier(.34,1.56,.64,1);transform-style:preserve-3d}
.ans-slot.empty{background:rgba(0,0,0,.06);border:none;box-shadow:inset 0 6px 12px rgba(0,0,0,.15),inset 0 2px 4px rgba(0,0,0,.05)}
.ans-slot.empty span{color:rgba(168,85,247,.4);font-size:1.8rem;transform:translateY(2px)}
.ans-slot.filled{border:2px solid rgba(255,255,255,.8);box-shadow:0 6px 0 rgba(0,0,0,.15),0 10px 15px rgba(0,0,0,.1);transform:translateY(-4px);animation:slotIn .3s cubic-bezier(.34,1.56,.64,1)}
.ans-slot.filled span{color:#fff;font-size:2.4rem;text-shadow:1px 2px 4px rgba(0,0,0,.2);z-index:1}
@keyframes slotIn{from{transform:translateY(10px) rotateX(-45deg) scale(0.8);opacity:0}to{transform:translateY(-4px) rotateX(0) scale(1);opacity:1}}
.ans-word{min-width:80px;height:68px;border-radius:18px;background:rgba(0,0,0,.06);box-shadow:inset 0 6px 12px rgba(0,0,0,.15);border:none;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:900;color:rgba(168,85,247,.4);transition:all .3s cubic-bezier(.34,1.56,.64,1);padding:0 10px}
.ans-word.show{background:linear-gradient(135deg,#c084fc,#8b5cf6);border:2px solid rgba(255,255,255,.8);color:#fff;font-size:2rem;box-shadow:0 6px 0 rgba(109,40,217,.4),0 10px 15px rgba(0,0,0,.15);transform:translateY(-4px);animation:slotIn .4s cubic-bezier(.34,1.56,.64,1)}

/* ===== 網格系統 ===== */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;perspective:1000px}
.card{aspect-ratio:1;border-radius:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;border:2px solid rgba(255,255,255,.6);box-shadow:0 6px 0 rgba(0,0,0,.15),0 10px 15px rgba(0,0,0,.1);user-select:none;transition:all .15s cubic-bezier(.34,1.56,.64,1);transform-style:preserve-3d;animation:cardIn .5s calc(var(--d)*.05s) cubic-bezier(.34,1.56,.64,1) both}
@keyframes cardIn{from{transform:translateZ(-100px) rotateY(90deg) rotateX(20deg);opacity:0}to{transform:translateZ(0) rotateY(0) rotateX(0);opacity:1}}
.card::before{content:'';position:absolute;top:4%;left:10%;width:80%;height:32%;background:rgba(255,255,255,.3);border-radius:50%;pointer-events:none}
.card .ch{font-size:clamp(2.2rem,8vw,3.5rem);font-weight:900;color:#fff;text-shadow:0 3px 6px rgba(0,0,0,.2);z-index:2;transform:translateZ(10px)}
.card:hover{transform:translateY(-2px) rotateX(10deg);box-shadow:0 8px 0 rgba(0,0,0,.15),0 15px 25px rgba(0,0,0,.12)}
.card.sel{border-color:#fff;box-shadow:0 0px 0 rgba(0,0,0,.15),0 2px 5px rgba(0,0,0,.1),0 0 0 4px rgba(168,85,247,.4);transform:translateY(6px) scale(.95)}
.card.matched{animation:boom .55s ease forwards;pointer-events:none}
@keyframes boom{0%{transform:scale(1)}40%{transform:scale(1.2) rotateZ(10deg) rotateX(20deg)}100%{transform:scale(0) rotateZ(-20deg);opacity:0}}
.card.wrong{animation:nope .45s ease}
@keyframes nope{0%,100%{transform:translateX(0) translateY(6px) scale(.95)}30%{transform:translateX(7px) translateY(6px) scale(.95)}60%{transform:translateX(-7px) translateY(6px) scale(.95)}}
.card.gone{visibility:hidden;pointer-events:none}

/* ===== 顏色類別 ===== */
.c0{background:linear-gradient(140deg,#fda4af,#fb7185)}
.c1{background:linear-gradient(140deg,#93c5fd,#60a5fa)}
.c2{background:linear-gradient(140deg,#86efac,#4ade80)}
.c3{background:linear-gradient(140deg,#fde68a,#fbbf24)}
.c4{background:linear-gradient(140deg,#d8b4fe,#c084fc)}
.c5{background:linear-gradient(140deg,#fdba74,#fb923c)}
.c6{background:linear-gradient(140deg,#67e8f9,#22d3ee)}
.c7{background:linear-gradient(140deg,#fca5a5,#f87171)}

/* ===== 按鈕與介面 ===== */
.btn-row{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.btn{padding:12px 24px;border:none;border-radius:50px;font-size:.95em;font-weight:900;cursor:pointer;transition:all .15s cubic-bezier(.34,1.56,.64,1);box-shadow:0 6px 0 rgba(0,0,0,.15),0 10px 15px rgba(0,0,0,.1);transform:translateY(0);position:relative}
.btn:active{box-shadow:0 0px 0 rgba(0,0,0,.15),0 2px 4px rgba(0,0,0,.1);transform:translateY(6px)}
.btn-purple{background:linear-gradient(135deg,#c084fc,#8b5cf6);color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.2)}
.btn-soft{background:#fff;color:#7c3aed;border:2px solid rgba(168,85,247,.2)}
.btn-green{background:linear-gradient(135deg,#86efac,#22c55e);color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.2)}

/* 3D Level Cards */
.lv-card {
    border:2px solid rgba(255,255,255,.5) !important;
    box-shadow:0 8px 0 rgba(0,0,0,.15),0 15px 20px rgba(0,0,0,.1) !important;
    transition:all .15s cubic-bezier(.34,1.56,.64,1) !important;
    transform:translateY(0) !important;
}
.lv-card:active {
    box-shadow:0 0px 0 rgba(0,0,0,.15),0 3px 6px rgba(0,0,0,.1) !important;
    transform:translateY(8px) scale(0.96) !important;
}

/* ===== 進度條與星等 ===== */
.prog{padding:8px 14px;background:rgba(255,255,255,.5);border-radius:12px;margin-bottom:16px;border:2px solid rgba(255,255,255,.6);box-shadow:inset 0 2px 4px rgba(0,0,0,.05)}
.prog-fill{height:10px;border-radius:8px;background:linear-gradient(90deg,#c084fc,#8b5cf6);transition:width .5s}
.st{width:20px;height:20px;opacity:.2;transition:.4s}.st.on{opacity:1;transform:scale(1.2)}

/* ===== 本地狀態 UI ===== */
.user-status{font-size:0.75em;color:#8b5cf6;text-align:center;margin-bottom:6px;font-weight:700}
.lv-card.completed::after{content:'✅';position:absolute;top:8px;right:8px;font-size:1.1rem;text-shadow:0 2px 4px rgba(0,0,0,.2)}
.best-score{font-size:0.6rem;color:#6d28d9;margin-top:2px}

/* ===== 彈窗 ===== */
.modal-bg{position:fixed;inset:0;z-index:2000;background:rgba(255,255,255,.6);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .4s}
.modal-bg.show{opacity:1;visibility:visible}
.mbox{background:#fff;border-radius:30px;padding:28px 24px;text-align:center;max-width:380px;width:88%;transform:scale(.6);transition:.5s cubic-bezier(.34,1.56,.64,1);box-shadow:0 20px 50px rgba(0,0,0,.1);border:2px solid rgba(168,85,247,.1)}
.modal-bg.show .mbox{transform:scale(1)}

@media(max-width:420px){
  .hdr h1{font-size:1.4em}.grid{gap:6px}.ans-slot{width:56px;height:56px}.ans-word{min-width:66px;height:56px}
}
</style>
</head>
<body>

<div class="scene menu" id="scene"></div>
<div class="deco" id="deco"></div>
<div class="fx" id="fx"></div>

<div class="wrap">
  <!-- START SCREEN -->
  <div class="screen active" id="scrStart">
    <div class="mascot-area">
      <div class="mascot"><div class="cat"><div class="cat-ear l"></div><div class="cat-ear r"></div><div class="cat-head"><div class="cat-eye l"></div><div class="cat-eye r"></div><div class="cat-blush l"></div><div class="cat-blush r"></div><div class="cat-nose"></div><div class="cat-mouth"></div></div></div></div>
      <div class="speech">歡迎回來！</div>
    </div>
    <div class="hdr" style="margin-top:10px">
      <h1>動詞消消樂</h1>
      <div class="user-status" id="userDisplay">進度自動保存在本機</div>
    </div>

    <div style="text-align:center; color:#a78bfa; font-size:0.9em; margin-bottom:15px; margin-top:20px;">選擇關卡</div>
    <div style="display:flex; justify-content:center; gap:16px; padding-bottom:10px;">
      <!-- 加大了按鈕尺寸與中文字體大小並加上3D結構 -->
      <button class="lv-card c2" id="lvBtn1" onclick="go(1)" style="width:115px;height:140px;border-radius:26px;cursor:pointer;color:white;position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;">
        <div style="font-size:2.6em;font-weight:900;line-height:1;text-shadow:0 3px 5px rgba(0,0,0,.2)">1</div>
        <div style="font-size:1.8em;font-weight:900;margin-top:6px;text-shadow:0 3px 5px rgba(0,0,0,.2)">簡單</div>
        <div class="best-score" id="best1" style="font-size:0.7em;margin-top:6px;text-shadow:0 1px 2px rgba(0,0,0,.2)">---</div>
      </button>
      <button class="lv-card c1" id="lvBtn2" onclick="go(2)" style="width:115px;height:140px;border-radius:26px;cursor:pointer;color:white;position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;">
        <div style="font-size:2.6em;font-weight:900;line-height:1;text-shadow:0 3px 5px rgba(0,0,0,.2)">2</div>
        <div style="font-size:1.8em;font-weight:900;margin-top:6px;text-shadow:0 3px 5px rgba(0,0,0,.2)">普通</div>
        <div class="best-score" id="best2" style="font-size:0.7em;margin-top:6px;text-shadow:0 1px 2px rgba(0,0,0,.2)">---</div>
      </button>
      <button class="lv-card c0" id="lvBtn3" onclick="go(3)" style="width:115px;height:140px;border-radius:26px;cursor:pointer;color:white;position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;">
        <div style="font-size:2.6em;font-weight:900;line-height:1;text-shadow:0 3px 5px rgba(0,0,0,.2)">3</div>
        <div style="font-size:1.8em;font-weight:900;margin-top:6px;text-shadow:0 3px 5px rgba(0,0,0,.2)">挑戰</div>
        <div class="best-score" id="best3" style="font-size:0.7em;margin-top:6px;text-shadow:0 1px 2px rgba(0,0,0,.2)">---</div>
      </button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen" id="scrGame">
    <div class="hdr">
      <h1 id="gameTitle">第 1 關</h1>
      <div class="hdr-sub">選兩個字拼成動詞</div>
    </div>

    <div class="mascot-area sm">
      <div class="mascot"><div class="cat sm"><div class="cat-ear l"></div><div class="cat-ear r"></div><div class="cat-head"><div class="cat-eye l"></div><div class="cat-eye r"></div><div class="cat-blush l"></div><div class="cat-blush r"></div><div class="cat-nose"></div><div class="cat-mouth"></div></div></div></div>
      <div class="speech sm" id="msg">試試看吧！</div>
    </div>

    <div class="bar">
      <span>進度</span>
      <div style="display:flex; gap:3px" id="starsW"></div>
      <span>錯誤: <span id="misN" style="color:#f87171">0</span></span>
    </div>

    <div class="ans-row" id="ansRow"></div>

    <div class="prog">
      <div class="prog-fill" id="progBar" style="width:0%"></div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="btn-row">
      <button class="btn btn-soft" onclick="clr()">重選</button>
      <button class="btn btn-purple" onclick="sub()">確認</button>
      <button class="btn btn-soft" onclick="doHint()">提示</button>
    </div>
    <div class="btn-row" style="margin-top: 10px;">
      <button class="btn btn-soft" onclick="home()">回首頁</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
  <div class="mbox" id="modalContent">
    <!-- Dynamic Content -->
  </div>
</div>

<script>
/* ===== LOCAL STORAGE & PROGRESS ===== */
let userProgress = {};

function loadProgress() {
  const saved = localStorage.getItem('verbGameProgress');
  if (saved) {
    try {
      userProgress = JSON.parse(saved);
    } catch (e) {
      userProgress = {};
    }
  }
  updateLevelButtons();
}

function saveResult(level, stars, mistakes) {
  const currentBest = userProgress[level] ? userProgress[level].stars : 0;
  if (stars >= currentBest) {
    userProgress[level] = { stars, mistakes, ts: Date.now() };
    localStorage.setItem('verbGameProgress', JSON.stringify(userProgress));
  }
  updateLevelButtons();
}

function updateLevelButtons() {
  for(let i=1; i<=3; i++) {
    const btn = document.getElementById(`lvBtn${i}`);
    const best = document.getElementById(`best${i}`);
    if(userProgress[i]) {
      btn.classList.add('completed');
      best.textContent = `最高: ${'⭐'.repeat(userProgress[i].stars)}`;
    }
  }
}

/* ===== GAME LOGIC ===== */
const DATA = {
  1: ["跑步", "跳高", "走路", "拍手", "唱歌", "跳舞", "玩耍", "微笑"],
  2: ["讀書", "寫字", "畫畫", "吃飯", "喝水", "睡覺", "起床", "洗澡"],
  3: ["刷牙", "拿住", "擁抱", "分享", "幫助", "照顧", "聽到", "說話"]
};

let lv, cards = [], sel = [], matched = new Set(), mis = 0, busy = false;

function go(level) {
  lv = level; mis = 0; sel = []; matched = new Set(); busy = false;
  document.getElementById('scene').className = 'scene lv' + lv;
  document.getElementById('scrStart').classList.remove('active');
  document.getElementById('scrGame').classList.add('active');
  document.getElementById('gameTitle').textContent = `第 ${lv} 關`;
  document.getElementById('misN').textContent = '0';
  initStars();
  buildGrid(); 
  updateProg();
  renderAns();
}

function buildGrid() {
  cards = [];
  DATA[lv].forEach((verb, vi) => {
    cards.push({ ch: verb[0], verb, vi, ci: vi % 8 });
    cards.push({ ch: verb[1], verb, vi, ci: vi % 8 });
  });
  cards.sort(() => Math.random() - 0.5);
  renderGrid();
}

function renderGrid() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  cards.forEach((c, i) => {
    const d = document.createElement('div');
    d.className = 'card c' + c.ci;
    d.style.setProperty('--d', i);
    d.innerHTML = `<span class="ch">${c.ch}</span>`;
    d.onclick = () => tap(i, d);
    g.appendChild(d);
  });
}

/* ===== 發音功能 (Web Speech API) ===== */
function speakWord(text) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel(); // 停止先前的發音，避免重疊
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-HK'; // 預設廣東話，若需國語可改為 'zh-TW'
    utterance.rate = 0.85; // 語速稍微放慢，適合小朋友
    utterance.pitch = 1.1; // 音調稍微提高，更顯生動
    window.speechSynthesis.speak(utterance);
  }
}

function tap(i, el) {
  if (busy || matched.has(i)) return;
  const idx = sel.findIndex(s => s.i === i);
  if (idx > -1) {
    sel.splice(idx, 1);
    el.classList.remove('sel');
  } else if (sel.length < 2) {
    speakWord(cards[i].ch); // 讀出單一選取的字
    sel.push({ i, el });
    el.classList.add('sel');
    if (sel.length === 2) setTimeout(sub, 700); // 延長判定時間(400改為700)，讓單字發音能完整播完
  }
  renderAns();
}

function renderAns() {
  const r = document.getElementById('ansRow');
  r.innerHTML = '';
  [0, 1].forEach(idx => {
    const slot = document.createElement('div');
    slot.className = 'ans-slot ' + (sel[idx] ? 'filled sb' + cards[sel[idx].i].ci : 'empty');
    slot.innerHTML = `<span>${sel[idx] ? cards[sel[idx].i].ch : '?'}</span>`;
    r.appendChild(slot);
    if (idx === 0) r.insertAdjacentHTML('beforeend', '<span style="color:rgba(168,85,247,.4);font-weight:900">+</span>');
  });
  r.insertAdjacentHTML('beforeend', '<span style="color:rgba(168,85,247,.4);font-weight:900">=</span>');
  const word = document.createElement('div');
  word.className = 'ans-word' + (sel.length === 2 ? ' show' : '');
  word.textContent = sel.length === 2 ? cards[sel[0].i].ch + cards[sel[1].i].ch : '??';
  r.appendChild(word);
}

function sub() {
  if (busy || sel.length !== 2) return;
  busy = true;
  const c0 = cards[sel[0].i], c1 = cards[sel[1].i];
  const isValid = (c0.vi === c1.vi && c0.ch === c0.verb[0] && c1.ch === c0.verb[1]);

  if (isValid) {
    speakWord(c0.verb); // 配對成功時，讀出完整的動詞
    sel.forEach(s => {
      s.el.classList.add('matched');
      matched.add(s.i);
    });
    setMsg('太棒了！');
    setTimeout(() => {
      sel.forEach(s => s.el.classList.add('gone'));
      sel = []; renderAns(); updateProg(); busy = false;
      if (matched.size === cards.length) victory();
    }, 600);
  } else {
    mis++;
    document.getElementById('misN').textContent = mis;
    sel.forEach(s => s.el.classList.add('wrong'));
    setMsg('再試一次！');
    setTimeout(() => {
      sel.forEach(s => s.el.classList.remove('wrong', 'sel'));
      sel = []; renderAns(); busy = false;
    }, 600);
  }
}

function clr() { if(!busy){ sel.forEach(s=>s.el.classList.remove('sel')); sel=[]; renderAns(); } }

function updateProg() {
  if (!cards || cards.length === 0) return;
  const p = (matched.size / cards.length) * 100;
  document.getElementById('progBar').style.width = p + '%';
  const stars = document.querySelectorAll('#starsW .st');
  if (p >= 30) stars[0]?.classList.add('on');
  if (p >= 70) stars[1]?.classList.add('on');
  if (p >= 100) stars[2]?.classList.add('on');
}

function victory() {
  speakWord("恭喜過關！"); // 全部完成時用語音提示
  const stars = mis === 0 ? 3 : mis <= 3 ? 2 : 1;
  saveResult(lv, stars, mis);
  
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <div style="font-size:4.5em; margin-bottom:10px;">🏆</div>
    <h2 style="color:#7c3aed; font-weight:900; font-size:1.8em;">恭喜通關！</h2>
    <div style="font-size:2em; margin:15px 0">${'⭐'.repeat(stars)}${'☆'.repeat(3-stars)}</div>
    <p style="color:#8b5cf6; font-size:1.1em; font-weight:700;">錯誤次數：${mis}</p>
    <div class="btn-row" style="margin-top:25px">
      <button class="btn btn-purple" onclick="go(${lv < 3 ? lv + 1 : lv})">${lv < 3 ? '下一關' : '再玩一次'}</button>
      <button class="btn btn-soft" onclick="home()">回主選單</button>
    </div>
  `;
  document.getElementById('modal').classList.add('show');
}

function home() {
  document.getElementById('modal').classList.remove('show');
  document.getElementById('scrGame').classList.remove('active');
  document.getElementById('scrStart').classList.add('active');
  document.getElementById('scene').className = 'scene menu';
}

function initStars() {
  const w = document.getElementById('starsW');
  w.innerHTML = '<span class="st">⭐</span><span class="st">⭐</span><span class="st">⭐</span>';
}

function setMsg(t) { document.getElementById('msg').textContent = t; }

function doHint() {
  if (busy) return;
  for (let verb of DATA[lv]) {
    const idx = cards.findIndex((c, i) => c.verb === verb && !matched.has(i));
    if (idx > -1) {
      setMsg(`提示：找「${verb}」`);
      const el = document.querySelectorAll('.card')[idx];
      el.classList.add('wrong');
      setTimeout(() => el.classList.remove('wrong'), 500);
      break;
    }
  }
}

/* ===== START ===== */
loadProgress();
</script>
</body>
